global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:${PORT}"]

  - job_name: neurorelato-backend
    scheme: https
    metrics_path: /metrics
    static_configs:
      # Host do app principal (sem https://). Ex: neurorelatopoc-xxxx.herokuapp.com
      - targets: ["${PN_METRICS_TARGET}"]
    # Se o /metrics estiver protegido por Basic Auth, o jeito mais simples para a PoC
    # e gerar este arquivo dinamicamente (com/sem basic_auth) no entrypoint.
    # Mantemos sem auth para evitar configuração "meio quebrada" quando vars estão vazias.
