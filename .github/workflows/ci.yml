name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plataformaneuro
          POSTGRES_PASSWORD: plataformaneuro
          POSTGRES_DB: plataformaneuro
          # Para o healthcheck não precisar de flags com espaço (Actions pode quebrar quoting).
          PGUSER: plataformaneuro
          PGDATABASE: plataformaneuro
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Install deps
        run: uv sync --frozen --group dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy app

      - name: Migrations (Postgres)
        env:
          PN_DATABASE_URL: postgresql+psycopg://plataformaneuro:plataformaneuro@localhost:5432/plataformaneuro
        run: uv run alembic upgrade head

      - name: Tests
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=90

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:coverage

      - name: Build
        run: npm run build
